name: Dependabot auto-merge

# Auto-merges Dependabot PRs once all required checks pass. Only fires for
# patch and minor updates; majors don't reach here because dependabot.yml is
# configured to ignore them entirely.
#
# The `test` job runs on every PR (not just Dependabot's) so the unit suite
# in tests/ gates every change. `automerge` `needs: test`, so a Dependabot PR
# only reaches `gh pr merge --auto` once the test job has gone green. Vercel's
# preview-build status check still gates the eventual auto-merge alongside
# this job — both must succeed for GitHub to actually merge.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  automerge:
    runs-on: ubuntu-latest
    needs: test
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch update metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch + minor
        if: steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
