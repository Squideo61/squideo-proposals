version: 2
updates:
  # Web app + API (root package.json)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      non-major-deps:
        update-types:
          - minor
          - patch
    # Ignore major bumps — they need real testing (Recharts API changes,
    # Vite/React compatibility, SDK rewrites). We'll handle majors manually
    # when we have time to verify each one. Security advisories still open
    # immediately regardless of this filter.
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # Chrome extension package
  - package-ecosystem: npm
    directory: "/extension"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      non-major-deps:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # GitHub Actions (if/when added)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
